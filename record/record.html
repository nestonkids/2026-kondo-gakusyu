<!DOCTYPE html>

<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>記録 - Future Screen</title>

    <link rel="stylesheet" href="../style.css"> </head>

<body>

    <div class="background-blobs">

        <div class="blob blob-1"></div>

        <div class="blob blob-2"></div>

        <div class="blob blob-3"></div>

    </div>

   

    <main class="container">

        <section id="history-screen" class="screen active">

            <div class="glass-card visible">

                <h2 class="screen-title">これまでの学習記録</h2>

               

                <div id="empty-history-message" class="empty-message">

                    <p>まだ記録がありません。復習を始めてみよう！</p>

                </div>



                <div id="history-list" class="history-list-container">

                    </div>



                <button class="back-button" onclick="location.href='../index.html'">

                    <span class="icon">🏠</span> ホームへ戻る

                </button>

            </div>

        </section>

    </main>



    <script src="history.js"></script> </body>

</html>
